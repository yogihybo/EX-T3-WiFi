; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
data_dir = data.gz

; ─────────────────────────────────────────────────────────────────────────────
; Shared settings inherited by every board environment
; ─────────────────────────────────────────────────────────────────────────────
[common]
monitor_speed = 115200
platform = espressif32
board = esp32dev
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
framework = arduino
upload_speed = 921600
monitor_filters = esp32_exception_decoder
check_skip_packages = yes
extra_scripts =
	data_gzip.py
	build_release.py
	upload_website.py
lib_deps =
	SPI
	bodmer/TFT_eSPI@^2.5.43
	bblanchon/ArduinoJson@^6.21.3
	bblanchon/StreamUtils@^1.9.0
	mathieucarbou/ESPAsyncWebServer @ 3.6.0
	lvgl/lvgl@^9.1.0
	igorantolic/Ai Esp32 Rotary Encoder@^1.6.0
	DCC-EX/DCCEXProtocol@^1.3.2
build_flags =
	-I src/ui
	-I src/core
	-I src/icons
	-I src/drivers
	-D CORE_DEBUG_LEVEL=1
	-D LV_CONF_SKIP
	-D LV_LVGL_H_INCLUDE_SIMPLE
	-D LV_USE_FONT_COMPRESSED=1
	-D LV_USE_BMP=1
	-D LV_CACHE_DEF_SIZE=2048
	-D LV_IMAGE_HEADER_CACHE_DEF_CNT=4
	-D LV_USE_TFT_ESPI=1
	-D LV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
	; Disable LVGL widgets not used in this project
	-D LV_USE_ANIMIMG=0
	-D LV_USE_ARCLABEL=0
	-D LV_USE_BUTTONMATRIX=1
	-D LV_USE_CALENDAR=0
	-D LV_USE_CANVAS=0
	-D LV_USE_QRCODE=0
	-D LV_USE_CHART=0
	-D LV_USE_CHECKBOX=0
	-D LV_USE_COLORWHEEL=0
	-D LV_USE_DROPDOWN=0
	-D LV_USE_IMAGEBUTTON=0
	-D LV_USE_LED=0
	-D LV_USE_LIST=0
	-D LV_USE_MENU=0
	-D LV_USE_METER=0
	-D LV_USE_ROLLER=0
	;-D LV_USE_SCALE=0
	-D LV_USE_SPAN=0
	-D LV_USE_SPINBOX=0
	-D LV_USE_SPINNER=0
	-D LV_USE_TABLE=0
	-D LV_USE_TILEVIEW=0
	-D LV_USE_WIN=0
	-D LV_FONT_MONTSERRAT_10=1
	-D LV_FONT_MONTSERRAT_12=1
	-D LV_FONT_MONTSERRAT_16=1
	-D LV_FONT_MONTSERRAT_28=1
	!python -c "import pathlib; print('\"-ffile-prefix-map=%%s/=\"' %% pathlib.Path.home().as_posix())"
	-DASYNCWEBSERVER_REGEX
	-DDISABLE_ALL_LIBRARY_WARNINGS
	-DUSER_SETUP_LOADED
	; TFT SPI pins (shared by both boards — both use ESP32 HSPI: IO12/13/14/15)
	-DTFT_MISO=12
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DUSE_HSPI_PORT
	-DTFT_DC=2
	-DTFT_RST=-1
	-DSPI_FREQUENCY=55000000
	-DSPI_READ_FREQUENCY=20000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-USMOOTH_FONT
	-D CONFIG_ASYNC_TCP_MAX_ACK_TIME=3000   ; Kill stale connections quicker
	-D CONFIG_ASYNC_TCP_QUEUE_SIZE=64       ; Event queue size
	-D CONFIG_ASYNC_TCP_PRIORITY=10
	-D CONFIG_ASYNC_TCP_RUNNING_CORE=1      ; Force async_tcp task to same core as Arduino app
	-D CONFIG_ASYNC_TCP_STACK_SIZE=4096     ; Reduced from default 16K
	-D MEMP_NUM_TCP_PCB=4                   ; Set the maximum raw open TCP sockets allowed at once (Default: 4-10)
	; SD card
	;-D CONFIG_FATFS_FS_LOCK=2             ; Limit maximum concurrently open files to 1 to save file cache memory
	;-D CONFIG_FATFS_MAX_LFN=0             ; Enforce the minimum sector size (512 bytes instead of 4096)
	;-D CONFIG_BT_ENABLED=0                ; No effect with pre-built Arduino libs – sdkconfig.h already defines this to 1
	-std=gnu++17
build_unflags =
	-std=gnu++11

; ─────────────────────────────────────────────────────────────────────────────
; Board: Sunton/LCDWIKI 2.8" ILI9341 (ESP32-2432S028R — "CYD")
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32-2432S028R]
extends = common
build_flags =
	${common.build_flags}
	; Display
	-DILI9341_2_DRIVER
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_BL=21
	-DTFT_BACKLIGHT_ON=LOW
	-DTFT_RGB_ORDER=TFT_BGR
	-DTFT_INVERSION_OFF
	; Touch — XPT2046 on dedicated bitbang SPI (separate from LCD SPI)
	-DTOUCH_MOSI=32
	-DTOUCH_MISO=39
	-DTOUCH_CLK=25
	-DTOUCH_CS=33
	-DTOUCH_IRQ=36
	; Rotary encoder
	-DENCODER_CLK_PIN=22
	-DENCODER_DT_PIN=27
	-DENCODER_BTN_PIN=35

; ─────────────────────────────────────────────────────────────────────────────
; Board: LCDWIKI 3.5" ST7796U (3.5inch_ESP32-32E_Display)
; https://www.lcdwiki.com/3.5inch_ESP32-32E_Display
; NOTE: TFT_BACKLIGHT_ON=HIGH assumed — verify if backlight is inverted.
; NOTE: Encoder DT moved to IO26 because IO27 is the backlight pin on this board.
; ─────────────────────────────────────────────────────────────────────────────
[env:3inch5-ESP32-32E]
extends = common
build_flags =
	${common.build_flags}
	; Display
	-DST7796_DRIVER
	-DTFT_WIDTH=320
	-DTFT_HEIGHT=480
	-DTFT_BL=27
	-DTFT_BACKLIGHT_ON=HIGH
	; Touch — XPT2046 shares the LCD SPI bus (IO12/13/14), CS=IO33, IRQ=IO36
	-DTOUCH_MOSI=13
	-DTOUCH_MISO=12
	-DTOUCH_CLK=14
	-DTOUCH_CS=33
	-DTOUCH_IRQ=36
	; Rotary encoder (IO27 unavailable — used for backlight; DT reassigned to IO26)
	-DENCODER_CLK_PIN=22
	-DENCODER_DT_PIN=26
	-DENCODER_BTN_PIN=35
	; PSRAM (4 MB)
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
