<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DCC-EX-CYD – Throttle Programming</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #111;
        color: #f0f0f0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 480px;
        width: 100%;
        background: #1e1e1e;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 2.5rem 2rem;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #fff;
      }
      p {
        font-size: 0.95rem;
        color: #aaa;
        line-height: 1.6;
      }
      .path {
        display: inline-block;
        margin-top: 0.75rem;
        background: #2a2a2a;
        border: 1px solid #444;
        border-radius: 6px;
        padding: 0.4rem 0.8rem;
        font-family: monospace;
        font-size: 0.9rem;
        color: #7dd3fc;
      }
      .refresh {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.5rem 1.25rem;
        border-radius: 6px;
        background: #1d4ed8;
        color: #fff;
        font-size: 0.875rem;
        text-decoration: none;
        cursor: pointer;
        border: none;
      }
      .refresh:hover { background: #1e40af; }
      .status {
        display: block;
        margin-top: 0.6rem;
        font-size: 0.8rem;
        color: #555;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#128683;</div>
      <h1>Throttle Programming Not Started</h1>
      <p>
        Go to Settings &rarr; Throttle Programming on the device to enable the
        web interface.
      </p>
      <div class="path">Settings &rarr; Programming &rarr; Throttle Programming</div>
      <br />
      <button class="refresh" onclick="window.location.href='/'">
        &#8635; Refresh
      </button>
      <div class="status" id="status">Checking every 3s&hellip;</div>
    </div>
    <script>
      (function () {
        var redirecting = false;

        function goApp() {
          if (redirecting) return;
          redirecting = true;
          clearInterval(pollId);
          window.location.href = '/';
        }

        var pollId = setInterval(function () {
          fetch('/throttle-programming', { method: 'HEAD', cache: 'no-store' })
            .then(function (r) { if (r.status === 200) goApp(); })
            .catch(function () { /* device unreachable, keep trying */ });
        }, 3000);
      })();
    </script>
  </body>
</html>
